<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKE A SHIFT.</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #141414;
            --terminal-bg: #000000;
            --text-main: #f0f0f0;
            --accent-green: #00ff66;
            --accent-red: #ff3333;
            --stellar-glow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.3);
            --border-color: #333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* Login Screen */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #login-screen input {
            padding: 10px;
            margin-top: 20px;
            background: #222;
            border: 1px solid var(--border-color);
            color: white;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 2px;
            outline: none;
        }
        
        #login-screen input:focus {
            border-color: var(--accent-green);
        }

        /* Header */
        header {
            text-align: center;
            padding: 20px 0;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 5px;
            text-shadow: var(--stellar-glow);
        }

        /* App Container */
        #app-container {
            display: none;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Terminal */
        .terminal-container {
            background: var(--terminal-bg);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            height: 300px;
        }

        .terminal-logs {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border-color);
        }

        .log-entry { margin-bottom: 4px; }
        .log-entry.in { color: var(--accent-green); }
        .log-entry.out { color: var(--accent-red); }
        .log-entry.system { color: #888; }

        .terminal-input-bar {
            display: flex;
            background: #111;
            padding: 10px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .terminal-input-bar select, .terminal-input-bar input {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 3px;
            outline: none;
        }

        .terminal-input-bar select:focus, .terminal-input-bar input:focus {
            border-color: var(--text-main);
        }

        .terminal-input-bar input[type="number"] { width: 120px; }
        .terminal-input-bar input[type="text"] { flex-grow: 1; min-width: 200px; }
        
        .terminal-input-bar button {
            background: var(--text-main);
            color: black;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .terminal-input-bar button:hover {
            background: var(--accent-green);
        }

        /* Charts Grid */
        .charts-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            height: 400px;
        }

        .chart-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .chart-wrapper {
            width: 100%;
            height: 85%;
            position: relative;
        }

        .chart-box h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .chart-controls {
            width: 100%;
            text-align: center;
        }

        .chart-controls select {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 5px 10px;
            border-radius: 3px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 60px 40px;
            font-style: italic;
            color: #b3b3b3;
            text-shadow: var(--stellar-glow);
            margin-top: 50px;
            border-top: 1px solid var(--border-color);
            font-size: 1rem;
            line-height: 1.6;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="text-shadow: var(--stellar-glow); font-weight: 300; letter-spacing: 5px;">MAKE A SHIFT.</h1>
        <input type="password" id="password-input" placeholder="Mot de passe" autofocus onkeypress="handleAuth(event)">
    </div>

    <div id="app-container">
        <header>
            <h1>MAKE A SHIFT.</h1>
        </header>

        <main>
            <div class="terminal-container">
                <div class="terminal-logs" id="logs"></div>
                <div class="terminal-input-bar">
                    <select id="sign">
                        <option value="+">+</option>
                        <option value="-">-</option>
                    </select>
                    <input type="number" id="amount" placeholder="Montant" step="0.01" required>
                    <select id="currency">
                        <option value="EUR">EUR</option>
                        <option value="USD">USD</option>
                        <option value="PYG">PYG</option>
                        <option value="USDT">USDT</option>
                        <option value="SOL">SOL</option>
                        <option value="BTC">BTC</option>
                        <option value="ETH">ETH</option>
                    </select>
                    <input type="text" id="reason" placeholder="Motif de la transaction (ex: course de la semaine)" required>
                    <select id="source">
                        <option value="SAFE">SAFE (Bank)</option>
                        <option value="CASH">CASH (Cash)</option>
                        <option value="COINS">COINS (Crypto)</option>
                        <option value="Revolut">Revolut (Bank)</option>
                        <option value="OKX">OKX (Crypto)</option>
                    </select>
                    <button onclick="addTransaction()">ENREGISTRER</button>
                </div>
            </div>

            <div class="charts-row">
                <div class="chart-box">
                    <h3>Croissance Globale du Capital</h3>
                    <div class="chart-wrapper">
                        <canvas id="lineChart"></canvas>
                    </div>
                </div>
                <div class="chart-box">
                    <h3>Répartition Globale</h3>
                    <div class="chart-wrapper">
                        <canvas id="donutChart"></canvas>
                    </div>
                    <div class="chart-controls">
                        <select id="donut-filter" onchange="updateDonut()">
                            <option value="expenses">Motifs de dépenses</option>
                            <option value="incomes">Sources de revenus</option>
                            <option value="sources">Répartition par Portefeuilles</option>
                        </select>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            "Dieu aide tout ceux qui veulent et font le bien à obtenir la richesse. Ceux qui veulent le mal prient le diable sinon ils ne pourraient l'obtenir, mais ils ne recoivent jamais la véritable richesse."
        </footer>
    </div>

    <script>
        // State Machine
        let transactions = JSON.parse(localStorage.getItem('makeashift_txs')) || [];
        let aiDictionary = JSON.parse(localStorage.getItem('makeashift_ai_dict')) || {};
        let exchangeRates = { EUR: 1, USD: 0, PYG: 0, USDT: 0, SOL: 0, BTC: 0, ETH: 0 };
        let charts = {};

        // SHA-256 Hash of "MAKEASHIFT." to prevent source-code bypass
        const AUTH_HASH = "8ba47bd216b25db56df9cb9753df28549e5d66002f23b7b252a5a589dc9e89d1";

        async function hashString(str) {
            const msgBuffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function handleAuth(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('password-input').value;
                const hashedInput = await hashString(input);
                if (hashedInput === AUTH_HASH) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'block';
                    await initApp();
                } else {
                    alert("Accès refusé. Clé stellaire incorrecte.");
                }
            }
        }

        // True Multi-Currency Engine (Fiat + Crypto)
        async function fetchMarketRates() {
            addLog('system', '> Connexion aux oracles financiers...');
            try {
                // 1. Fetch Fiat Rates (Base EUR)
                const fiatRes = await fetch('https://open.er-api.com/v6/latest/EUR');
                const fiatData = await fiatRes.json();
                exchangeRates.USD = 1 / fiatData.rates.USD;
                exchangeRates.PYG = 1 / fiatData.rates.PYG;
                exchangeRates.USDT = 1 / fiatData.rates.USD; // Pegged

                // 2. Fetch Crypto Rates (Base EUR)
                const cryptoRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana,bitcoin,ethereum&vs_currencies=eur');
                const cryptoData = await cryptoRes.json();
                exchangeRates.SOL = cryptoData.solana.eur;
                exchangeRates.BTC = cryptoData.bitcoin.eur;
                exchangeRates.ETH = cryptoData.ethereum.eur;

                addLog('system', `> Taux synchronisés. SOL: ${exchangeRates.SOL.toFixed(2)}€ | BTC: ${exchangeRates.BTC.toFixed(2)}€ | USD: ${(1/exchangeRates.USD).toFixed(4)}€`);
            } catch (err) {
                addLog('system', '> Alerte : Échec de mise à jour des taux. Utilisation des derniers taux connus.');
                console.error(err);
            }
        }

        // Adaptive Locally-Learned Taxonomy Engine
        function analyzeAndCategorize(reason) {
            const cleanReason = reason.trim().toLowerCase();
            
            // Check dynamically learned memory first
            if (aiDictionary[cleanReason]) {
                return aiDictionary[cleanReason];
            }

            // Fallback to native heuristic layers
            if (/\b(course|courses|loyer|charge|charges|electricite|eau|supermarche|vivres)\b/.test(cleanReason)) {
                return 'Vivres';
            }
            if (/\b(restau|restaurant|bouffe|barbecue|bar|cafe|fastfood|mcdo|subway|plaisir)\b/.test(cleanReason)) {
                return 'Plaisirs culinaires';
            }
            if (/\b(salaire|virement|freelance|interet|dividende|gain)\b/.test(cleanReason)) {
                return 'Revenus directes';
            }
            if (/\b(crypto|bitcoin|solana|trade|investissement|eth)\b/.test(cleanReason)) {
                return 'Investissements';
            }

            // Context generation for unclassified items
            return 'Divers Autogéré';
        }

        // Immutable Transaction Creation
        function addTransaction() {
            const sign = document.getElementById('sign').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            const reason = document.getElementById('reason').value;
            const source = document.getElementById('source').value;

            if (isNaN(amount) || amount <= 0 || !reason.trim()) {
                alert("Erreur: Données d'entrée invalides.");
                return;
            }

            // PHOTOGRAPHIE FIXE du taux à la seconde précise du clic
            const rateAtThisMoment = exchangeRates[currency] || 1;
            const valueInEUR = amount * rateAtThisMoment;

            const category = analyzeAndCategorize(reason);
            const timestamp = new Date().toISOString();

            // Save immutable data block
            const tx = {
                id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
                sign, amount, currency, rateAtThisMoment, valueInEUR, reason, source, category, timestamp
            };

            // Auto-learn routine for the classification engine
            const cleanReason = reason.trim().toLowerCase();
            if (!aiDictionary[cleanReason]) {
                aiDictionary[cleanReason] = category;
                localStorage.setItem('makeashift_ai_dict', JSON.stringify(aiDictionary));
            }

            transactions.push(tx);
            localStorage.setItem('makeashift_txs', JSON.stringify(transactions));

            // Log rendering
            renderLogEntry(tx);

            // Interface clear
            document.getElementById('amount').value = '';
            document.getElementById('reason').value = '';

            updateCharts();
        }

        function renderLogEntry(tx) {
            let msg = `${tx.sign}${tx.amount} ${tx.currency} via [${tx.source}] - ${tx.reason} (${tx.category})`;
            if (tx.currency !== 'EUR') {
                msg += ` [Fizé à : ${tx.valueInEUR.toFixed(2)} EUR]`;
            }
            addLog(tx.sign === '+' ? 'in' : 'out', msg, tx.timestamp);
        }

        function addLog(type, message, isoString = null) {
            const logsDiv = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = isoString ? new Date(isoString).toLocaleTimeString() : new Date().toLocaleTimeString();
            entry.innerText = `[${time}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        // Financial Charting Architecture
        Chart.defaults.color = '#f0f0f0';
        Chart.defaults.font.family = 'Inter, sans-serif';

        function initCharts() {
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            charts.line = new Chart(ctxLine, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Capital Total (EUR)', data: [], borderColor: '#00ff66', backgroundColor: 'rgba(0, 255, 102, 0.05)', tension: 0.15, fill: true, pointRadius: 2 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { color: '#222' } }, y: { grid: { color: '#222' } } } }
            });

            const ctxDonut = document.getElementById('donutChart').getContext('2d');
            charts.donut = new Chart(ctxDonut, {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#ff3333', '#00ff66', '#33aaff', '#ffaa00', '#aa33ff', '#ff33aa', '#00ffff'], borderLineWidth: 1, borderColor: '#141414' }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'right', labels: { boxWidth: 12 } } } }
            });
        }

        function updateCharts() {
            // 1. Line Chart Calculation (Historical continuous equity curve)
            let runningTotalEUR = 0;
            const historyData = [];
            const labels = [];

            // Sort transactions by date to ensure historical alignment
            transactions.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            transactions.forEach((tx, i) => {
                const delta = tx.sign === '+' ? tx.valueInEUR : -tx.valueInEUR;
                runningTotalEUR += delta;
                historyData.push(runningTotalEUR.toFixed(2));
                labels.push(new Date(tx.timestamp).toLocaleDateString());
            });

            charts.line.data.labels = labels;
            charts.line.data.datasets[0].data = historyData;
            charts.line.update();

            // 2. Donut Segment Render
            updateDonut();
        }

        function updateDonut() {
            const filter = document.getElementById('donut-filter').value;
            const segments = {};

            transactions.forEach(tx => {
                if (filter === 'expenses' && tx.sign === '-') {
                    segments[tx.category] = (segments[tx.category] || 0) + tx.valueInEUR;
                } else if (filter === 'incomes' && tx.sign === '+') {
                    segments[tx.category] = (segments[tx.category] || 0) + tx.valueInEUR;
                } else if (filter === 'sources') {
                    const delta = tx.sign === '+' ? tx.valueInEUR : -tx.valueInEUR;
                    segments[tx.source] = (segments[tx.source] || 0) + delta;
                }
            });

            charts.donut.data.labels = Object.keys(segments);
            charts.donut.data.datasets[0].data = Object.values(segments).map(v => Math.max(0, v).toFixed(2));
            charts.donut.update();
        }

        async function initApp() {
            initCharts();
            addLog('system', '> Démarrage du noyau de calcul...');
            await fetchMarketRates();
            
            // Render logs sequentially from stored immutable items
            if (transactions.length === 0) {
                addLog('system', '> Aucun historique détecté. Prêt pour saisie.');
            } else {
                transactions.forEach(tx => renderLogEntry(tx));
            }
            updateCharts();
        }
    </script>
</body>
</html>
