<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKE A SHIFT.</title>
    <style>
        :root {
            /* Mode Sombre (Défaut) */
            --bg-color: #000000;
            --text-color: #ffffff;
            --panel-bg: #111111;
            --border-color: #333333;
            --accent: #ffffff;
            --stellar-glow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.3);
            --filter-night: none;
        }

        body.theme-light {
            --bg-color: #ffffff;
            --text-color: #000000;
            --panel-bg: #f0f0f0;
            --border-color: #cccccc;
            --accent: #000000;
            --stellar-glow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        body.theme-night {
            --bg-color: #1a0f00;
            --text-color: #ffcc80;
            --panel-bg: #2a1a00;
            --border-color: #664400;
            --accent: #ffcc80;
            --stellar-glow: 0 0 10px rgba(255, 204, 128, 0.3);
            /* Anti lumière bleue */
            filter: sepia(0.3) hue-rotate(-15deg);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Top Controls */
        #top-controls {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 100;
        }

        #top-controls select, #top-controls button {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            cursor: pointer;
            outline: none;
            font-weight: bold;
        }

        #edit-mode-btn.active {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* Login Screen */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #login-screen input {
            padding: 15px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 2px;
            outline: none;
            width: 300px;
        }

        #login-screen input:focus {
            border-color: var(--text-color);
            box-shadow: var(--stellar-glow);
        }

        /* App Container */
        #app-container {
            display: none;
            padding: 60px 20px 20px 20px;
            max-width: 1200px;
            margin: 0 auto;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 20px 0 40px 0;
        }

        .stellar-text {
            font-weight: 300;
            letter-spacing: 5px;
            text-shadow: var(--stellar-glow);
            margin: 0;
        }

        header h1 {
            font-size: 2rem;
        }

        /* Terminal (Drastically expanded) */
        .terminal-container {
            flex-grow: 1;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .terminal-logs {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            line-height: 1.5;
            border-bottom: 1px solid var(--border-color);
        }

        .log-entry { margin-bottom: 5px; }
        .log-entry.system { color: #888; }
        .log-entry.in { color: #00ff66; } /* Exceptions couleur pragmatiques pour la lisibilité log */
        .log-entry.out { color: #ff3333; }
        
        .theme-light .log-entry.in { color: #008800; }
        .theme-light .log-entry.out { color: #cc0000; }

        .terminal-input-bar {
            display: flex;
            background: var(--panel-bg);
            padding: 15px;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .terminal-input-bar select, .terminal-input-bar input, .terminal-input-bar button {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            outline: none;
            font-family: inherit;
        }

        .terminal-input-bar input[type="number"] { width: 120px; }
        .terminal-input-bar input[type="text"] { flex-grow: 1; min-width: 200px; }
        
        .terminal-input-bar button {
            background: var(--text-color);
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        /* Edit tools */
        .edit-tool {
            display: none;
            background: transparent;
            border: 1px dashed var(--text-color) !important;
            color: var(--text-color) !important;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 5px !important;
        }

        body.editing .edit-tool {
            display: inline-block;
        }

        [contenteditable="true"] {
            border-bottom: 1px dashed var(--border-color);
            outline: none;
            min-width: 20px;
            display: inline-block;
        }

        [contenteditable="true"]:focus {
            border-bottom: 1px solid var(--text-color);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 1rem;
        }

    </style>
</head>
<body class="theme-dark">

    <div id="top-controls">
        <select id="theme-switcher" onchange="changeTheme()">
            <option value="theme-dark" data-i18n="theme_dark">Sombre</option>
            <option value="theme-light" data-i18n="theme_light">Jour</option>
            <option value="theme-night" data-i18n="theme_night">Nuit</option>
        </select>
        <button id="edit-mode-btn" onclick="toggleEditMode()">EDIT MODE: OFF</button>
        <select id="lang-switcher" onchange="changeLanguage()">
            <option value="fr">FR</option>
            <option value="en">EN</option>
        </select>
    </div>

    <div id="login-screen">
        <input type="password" id="password-input" placeholder="Mot de passe" autofocus onkeypress="handleAuth(event)">
    </div>

    <div id="app-container" style="display:none;">
        <header>
            <h1 class="stellar-text">MAKE A SHIFT.</h1>
        </header>

        <div class="terminal-container">
            <div class="terminal-logs" id="logs"></div>
            
            <div class="terminal-input-bar">
                <select id="sign">
                    <option value="+">+</option>
                    <option value="-">-</option>
                </select>
                
                <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                
                <select id="currency">
                    <option value="EUR">EUR</option>
                    <option value="USD">USD</option>
                    <option value="PYG">PYG</option>
                    <option value="USDT">USDT</option>
                    <option value="SOL">SOL</option>
                    <option value="BTC">BTC</option>
                    <option value="ETH">ETH</option>
                </select>
                
                <input type="text" id="reason" placeholder="Motif de la transaction" required data-i18n-placeholder="placeholder_reason">
                
                <div>
                    <select id="source"></select>
                    <button class="edit-tool" onclick="manageList('sources')">Gérer Sources</button>
                </div>

                <div>
                    <select id="category"></select>
                    <button class="edit-tool" onclick="manageList('categories')">Gérer Catégories</button>
                </div>

                <button onclick="addTransaction()" id="btn-save" data-i18n="btn_save">ENREGISTRER</button>
            </div>
        </div>

        <footer>
            <p class="stellar-text" style="font-size: 1.2rem;">
                "Dieu aide tout ceux qui veulent et font le bien à obtenir la richesse. Ceux qui veulent le mal prient le diable sinon ils ne pourraient l'obtenir, mais ils ne recoivent jamais la véritable richesse."
            </p>
        </footer>
    </div>

    <script>
        // --- Core State & Configuration ---
        const AUTH_HASH = "TUFLRUFTSElGVC4="; // Base64 for "MAKEASHIFT." Pragmatic fix.
        
        let state = {
            transactions: JSON.parse(localStorage.getItem('makeashift_txs')) || [],
            sources: JSON.parse(localStorage.getItem('makeashift_sources')) || ['SAFE (Bank)', 'CASH (Cash)', 'COINS (Crypto)'],
            categories: JSON.parse(localStorage.getItem('makeashift_categories')) || ['Vivres', 'Revenus directes', 'Investissements', 'Divers'],
            uiTexts: JSON.parse(localStorage.getItem('makeashift_texts')) || {},
            currentLang: 'fr',
            isEditing: false
        };

        let exchangeRates = { EUR: 1, USD: 0, PYG: 0, USDT: 0, SOL: 0, BTC: 0, ETH: 0 };

        // --- I18n Dictionary ---
        const dictionary = {
            fr: {
                theme_dark: "Sombre", theme_light: "Jour", theme_night: "Nuit",
                btn_save: "ENREGISTRER", placeholder_reason: "Motif de la transaction",
                sys_start: "> Démarrage du noyau...", sys_empty: "> Aucun historique détecté.",
                prompt_add: "Ajouter une nouvelle entrée :", prompt_del: "Écrivez le nom exact à supprimer :"
            },
            en: {
                theme_dark: "Dark", theme_light: "Light", theme_night: "Night",
                btn_save: "SAVE", placeholder_reason: "Transaction reason",
                sys_start: "> Core engine starting...", sys_empty: "> No history detected.",
                prompt_add: "Add new entry:", prompt_del: "Type exact name to delete:"
            }
        };

        // --- Init & Auth ---
        function handleAuth(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('password-input').value;
                if (btoa(input) === AUTH_HASH) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                    initApp();
                } else {
                    alert("Accès refusé.");
                }
            }
        }

        async function initApp() {
            populateSelect('source', state.sources);
            populateSelect('category', state.categories);
            applyLanguage();
            
            addLog('system', getText('sys_start'));
            await fetchMarketRates();
            
            if (state.transactions.length === 0) {
                addLog('system', getText('sys_empty'));
            } else {
                state.transactions.forEach(tx => renderLogEntry(tx));
            }
        }

        // --- UI Interactions ---
        function changeTheme() {
            document.body.className = document.getElementById('theme-switcher').value;
        }

        function changeLanguage() {
            state.currentLang = document.getElementById('lang-switcher').value;
            applyLanguage();
        }

        function getText(key) {
            // Edit mode overrides taking precedence
            if (state.uiTexts[`${state.currentLang}_${key}`]) return state.uiTexts[`${state.currentLang}_${key}`];
            return dictionary[state.currentLang][key] || key;
        }

        function applyLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = getText(key);
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                el.placeholder = getText(key);
            });
        }

        function toggleEditMode() {
            state.isEditing = !state.isEditing;
            const btn = document.getElementById('edit-mode-btn');
            
            if (state.isEditing) {
                document.body.classList.add('editing');
                btn.innerText = "EDIT MODE: ON";
                btn.classList.add('active');
                
                // Make text translatable editable
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    el.contentEditable = "true";
                    el.onblur = (e) => {
                        const key = el.getAttribute('data-i18n');
                        state.uiTexts[`${state.currentLang}_${key}`] = e.target.innerText;
                        localStorage.setItem('makeashift_texts', JSON.stringify(state.uiTexts));
                    };
                });
            } else {
                document.body.classList.remove('editing');
                btn.innerText = "EDIT MODE: OFF";
                btn.classList.remove('active');
                document.querySelectorAll('[data-i18n]').forEach(el => el.contentEditable = "false");
            }
        }

        function manageList(listName) {
            const list = state[listName];
            const action = prompt(`1: Ajouter\n2: Supprimer\n(Liste actuelle: ${list.join(', ')})`, "1");
            
            if (action === "1") {
                const newItem = prompt(getText('prompt_add'));
                if (newItem) {
                    list.push(newItem);
                    saveList(listName);
                }
            } else if (action === "2") {
                const itemToDel = prompt(getText('prompt_del') + `\n[${list.join(', ')}]`);
                const idx = list.indexOf(itemToDel);
                if (idx > -1) {
                    list.splice(idx, 1);
                    saveList(listName);
                }
            }
        }

        function saveList(listName) {
            localStorage.setItem(`makeashift_${listName}`, JSON.stringify(state[listName]));
            populateSelect(listName === 'sources' ? 'source' : 'category', state[listName]);
        }

        function populateSelect(elementId, array) {
            const select = document.getElementById(elementId);
            select.innerHTML = '';
            array.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                opt.innerText = item;
                select.appendChild(opt);
            });
        }

        // --- Financial Engine ---
        async function fetchMarketRates() {
            try {
                const fiatRes = await fetch('https://open.er-api.com/v6/latest/EUR');
                const fiatData = await fiatRes.json();
                exchangeRates.USD = 1 / fiatData.rates.USD;
                exchangeRates.PYG = 1 / fiatData.rates.PYG;
                exchangeRates.USDT = 1 / fiatData.rates.USD;

                const cryptoRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana,bitcoin,ethereum&vs_currencies=eur');
                const cryptoData = await cryptoRes.json();
                exchangeRates.SOL = cryptoData.solana.eur;
                exchangeRates.BTC = cryptoData.bitcoin.eur;
                exchangeRates.ETH = cryptoData.ethereum.eur;

                addLog('system', `> Taux OK. SOL: ${exchangeRates.SOL.toFixed(2)}€ | USD: ${(1/exchangeRates.USD).toFixed(4)}€`);
            } catch (err) {
                addLog('system', '> Alerte : Mode hors ligne, taux à 1 par défaut.');
            }
        }

        function addTransaction() {
            const sign = document.getElementById('sign').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            const reason = document.getElementById('reason').value;
            const source = document.getElementById('source').value;
            const category = document.getElementById('category').value; // Now explicit

            if (isNaN(amount) || amount <= 0 || !reason.trim()) return;

            const rateAtThisMoment = exchangeRates[currency] || 1;
            const valueInEUR = amount * rateAtThisMoment;

            const tx = {
                id: Date.now().toString(),
                sign, amount, currency, rateAtThisMoment, valueInEUR, reason, source, category, 
                timestamp: new Date().toISOString()
            };

            state.transactions.push(tx);
            localStorage.setItem('makeashift_txs', JSON.stringify(state.transactions));

            renderLogEntry(tx);

            document.getElementById('amount').value = '';
            document.getElementById('reason').value = '';
        }

        function renderLogEntry(tx) {
            let msg = `${tx.sign}${tx.amount} ${tx.currency} [${tx.source}] - ${tx.reason} (${tx.category})`;
            if (tx.currency !== 'EUR') msg += ` [Figé: ${tx.valueInEUR.toFixed(2)} EUR]`;
            addLog(tx.sign === '+' ? 'in' : 'out', msg, tx.timestamp);
        }

        function addLog(type, message, isoString = null) {
            const logsDiv = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = isoString ? new Date(isoString).toLocaleTimeString() : new Date().toLocaleTimeString();
            entry.innerText = `[${time}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
    </script>
</body>
</html>
